<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Вход — Админка</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; display: flex; flex-direction: column; }

  .header { background: #1a73e8; color: #fff; padding: 16px; }
  .header h1 { font-size: 18px; font-weight: 700; }

  .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }

  .card { background: #fff; border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
  .card-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .card-sub { font-size: 14px; color: #888; margin-bottom: 24px; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
  .field input { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 12px 14px; font-size: 16px; }
  .field input:focus { outline: none; border-color: #1a73e8; }

  .btn-submit { width: 100%; background: #1a73e8; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn-submit:active { background: #1558b0; }

  .error { background: #f8d7da; color: #721c24; border-radius: 8px; padding: 10px 14px; font-size: 14px; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>СборкаV3</h1>
</div>

<div class="content">
  <div class="card">
    <div class="card-title">Вход в админку</div>
    <div class="card-sub">Управление листами</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="field">
        <label>Пароль</label>
        <input type="password" name="password" autofocus placeholder="Введите пароль">
      </div>
      <button type="submit" class="btn-submit">Войти</button>
    </form>
  </div>
</div>

</body>
</html>
