<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>СборкаV3</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }

  .tabs { display: flex; background: #1a73e8; position: sticky; top: 0; z-index: 10; align-items: stretch; }
  .tab { flex: 1; padding: 14px 4px; text-align: center; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
  .tab.active { color: #fff; border-bottom-color: #fff; }
  .admin-link { color: rgba(255,255,255,0.5); font-size: 18px; padding: 0 14px; display: flex; align-items: center; text-decoration: none; }
  .admin-link:hover { color: #fff; }

  .filter-bar { background: #fff; padding: 10px 12px; display: flex; gap: 8px; border-bottom: 1px solid #eee; position: sticky; top: 47px; z-index: 9; align-items: center; }
  .filter-bar input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; font-size: 14px; min-width: 0; }
  .filter-bar input:focus { outline: none; border-color: #1a73e8; }
  .date-wrap { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .date-wrap input { flex: none; width: 100%; }
  .date-label { font-size: 11px; color: #999; padding: 0 4px 3px; }
  .btn-clear { background: #f0f0f0; border: none; border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer; color: #666; white-space: nowrap; }
  .btn-export { background: #34a853; border: none; border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer; color: #fff; white-space: nowrap; text-decoration: none; display: flex; align-items: center; }

  .list { padding: 12px; padding-bottom: 80px; }
  .card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .card-shk { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .card-meta { font-size: 13px; color: #666; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .card-dt { font-size: 12px; color: #aaa; }
  .card-actions { margin-top: 10px; display: flex; gap: 8px; }
  .btn-edit { background: #1a73e8; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
  .btn-del { background: #ea4335; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
  .empty { text-align: center; color: #999; padding: 40px 20px; font-size: 15px; }

  .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: #1a73e8; border-radius: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(0,0,0,.3); cursor: pointer; z-index: 20; border: none; }
  .fab svg { fill: white; width: 28px; height: 28px; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 30; }
  .overlay.open { display: flex; align-items: flex-end; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  .field input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 16px; }
  .field input:focus { outline: none; border-color: #1a73e8; }

  .counter { display: flex; align-items: center; gap: 10px; }
  .counter button { width: 36px; height: 36px; border-radius: 18px; border: 1px solid #ddd; background: #f0f0f0; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .counter input { width: 70px; text-align: center; }

  .scan-row { display: flex; gap: 8px; }
  .scan-row input { flex: 1; }
  .btn-scan { background: #34a853; color: white; border: none; border-radius: 8px; padding: 0 16px; font-size: 13px; cursor: pointer; white-space: nowrap; }

  .cam-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 50; flex-direction: column; align-items: center; justify-content: center; }
  .cam-overlay.open { display: flex; }
  #cam-native { width: 100%; max-width: 480px; position: relative; }
  #cam-video { width: 100%; display: block; }
  #cam-reader { width: 100%; max-width: 480px; }
  #cam-reader video { width: 100% !important; border-radius: 0; }
  .scan-frame { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 80%; height: 100px; border: 2px solid rgba(255,255,255,0.85); border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); pointer-events: none; }
  .scan-frame::after { content: ''; position: absolute; left: 0; right: 0; top: 20%; height: 2px; background: #ff3333; box-shadow: 0 0 8px #ff3333; animation: scanline 1.5s ease-in-out infinite; }
  @keyframes scanline { 0%,100% { top: 15%; } 50% { top: 80%; } }
  .cam-hint { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 16px; text-align: center; }
  .cam-close { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,.7); color: #fff; border: 2px solid rgba(255,255,255,.5); border-radius: 10px; padding: 12px 20px; font-size: 16px; cursor: pointer; z-index: 51; }

  .btn-submit { width: 100%; background: #1a73e8; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 6px; }
  .btn-cancel { width: 100%; background: #f0f0f0; color: #333; border: none; border-radius: 10px; padding: 14px; font-size: 16px; cursor: pointer; margin-top: 8px; }

  .loading { text-align: center; padding: 30px; color: #999; }
  .filter-count { font-size: 12px; color: #999; padding: 4px 12px; }
</style>
</head>
<body>

<div class="tabs" id="tabs">
  {% for sheet in sheets %}
  <div class="tab {% if loop.first %}active{% endif %}" data-sheet="{{ sheet }}">{{ sheet }}</div>
  {% endfor %}
  <a class="admin-link" href="/admin" title="Управление листами">⚙</a>
</div>

<div class="filter-bar">
  <input type="text" id="filter-shk" placeholder="🔍 Штрихкод" oninput="applyFilters()">
  <div class="date-wrap">
    <span class="date-label">Дата</span>
    <input type="date" id="filter-date" oninput="applyFilters()">
  </div>
  <button class="btn-clear" id="btn-clear" onclick="clearFilters()" style="display:none">✕</button>
  <a class="btn-export" id="btn-export" href="#" title="Скачать Excel">📥</a>
</div>

<div class="list" id="list">
  <div class="loading">Загрузка...</div>
</div>

<button class="fab" id="fab" title="Добавить">
  <svg viewBox="0 0 24 24"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
</button>

<div class="overlay" id="form-overlay">
  <div class="modal">
    <div class="modal-title" id="form-title">Добавить запись</div>
    <form id="row-form">
      <input type="hidden" id="edit-id">
      <input type="hidden" id="f-data">

      <div class="field">
        <label>ШК (штрихкод)</label>
        <div class="scan-row">
          <input type="text" id="f-shk" placeholder="Сканируйте или введите">
          <button type="button" class="btn-scan" id="btn-scan">📷 Скан</button>
        </div>
      </div>

      <div class="field">
        <label>Количество</label>
        <div class="counter">
          <button type="button" onclick="dec('f-kol')">−</button>
          <input type="number" id="f-kol" value="1" min="0">
          <button type="button" onclick="inc('f-kol')">+</button>
        </div>
      </div>

      <div class="field">
        <label>Номер короба</label>
        <div class="counter">
          <button type="button" onclick="dec('f-korob')">−</button>
          <input type="number" id="f-korob" value="1" min="0">
          <button type="button" onclick="inc('f-korob')">+</button>
        </div>
      </div>

      <button type="submit" class="btn-submit">Сохранить</button>
      <button type="button" class="btn-cancel" id="btn-cancel">Отмена</button>
    </form>
  </div>
</div>

<div class="cam-overlay" id="cam-overlay">
  <div id="cam-native" style="display:none">
    <video id="cam-video" autoplay playsinline muted></video>
    <div class="scan-frame"></div>
  </div>
  <div id="cam-reader"></div>
  <div class="cam-hint">Наведите штрихкод на полосу</div>
  <button class="cam-close" id="cam-close">✕ Закрыть</button>
</div>

<script>
const SHEETS = {{ sheets | tojson }};
let currentSheet = SHEETS[0];
let allRows = [];
let html5QrCode = null;

// ---- DATETIME ----
function nowDatetime() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ---- TABS ----
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentSheet = tab.dataset.sheet;
  updateExportLink();
  loadRows();
});

function updateExportLink() {
  document.getElementById('btn-export').href = `/api/export/${encodeURIComponent(currentSheet)}`;
}

// ---- LOAD & RENDER ----
async function loadRows() {
  const list = document.getElementById('list');
  list.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    const resp = await fetch(`/api/rows/${encodeURIComponent(currentSheet)}`);
    const data = await resp.json();
    if (!resp.ok) {
      list.innerHTML = `<div class="empty">Ошибка: ${data.error || resp.statusText}</div>`;
      return;
    }
    allRows = data;
    applyFilters();
  } catch(e) {
    list.innerHTML = `<div class="empty">Ошибка: ${e.message}</div>`;
  }
}

function parseRecordDate(str) {
  const dateStr = (str || '').split(' ')[0];
  const parts = dateStr.split('.');
  if (parts.length !== 3) return null;
  return new Date(+parts[2], +parts[1] - 1, +parts[0]);
}

function applyFilters() {
  const shkVal = document.getElementById('filter-shk').value.trim().toLowerCase();
  const dateVal = document.getElementById('filter-date').value;
  const hasFilter = shkVal || dateVal;
  document.getElementById('btn-clear').style.display = hasFilter ? 'block' : 'none';

  let filterDate = null;
  if (dateVal) {
    const [y, m, d] = dateVal.split('-');
    filterDate = new Date(+y, +m - 1, +d);
  }

  const filtered = allRows.filter(r => {
    if (shkVal && !(r.shk || '').toLowerCase().includes(shkVal)) return false;
    if (filterDate) {
      const rd = parseRecordDate(r.data);
      if (!rd || rd.getTime() !== filterDate.getTime()) return false;
    }
    return true;
  });

  renderRows(filtered, allRows.length);
}

function clearFilters() {
  document.getElementById('filter-shk').value = '';
  document.getElementById('filter-date').value = '';
  applyFilters();
}

function renderRows(rows, total) {
  const list = document.getElementById('list');
  if (!rows.length) {
    list.innerHTML = `<div class="empty">${total ? 'Нет совпадений' : 'Нет данных'}</div>`;
    return;
  }
  const countHtml = rows.length < total
    ? `<div class="filter-count">Показано ${rows.length} из ${total}</div>`
    : '';
  list.innerHTML = countHtml + rows.map(r => {
    const dt = r.data || '';
    const [datePart, timePart] = dt.includes(' ') ? dt.split(' ') : [dt, ''];
    return `
    <div class="card">
      <div class="card-shk">${r.shk || '—'}</div>
      <div class="card-meta">
        <span>Кол: <b>${r.kolichestvo || 0}</b></span>
        <span>Короб: <b>${r.nomerKoroba || '—'}</b></span>
        <span class="card-dt">📅 ${datePart}${timePart ? ' ' + timePart : ''}</span>
      </div>
      <div class="card-actions">
        <button class="btn-edit" onclick="openEdit(${r.id}, ${JSON.stringify(r).replace(/"/g,'&quot;')})">✏️</button>
        <button class="btn-del" onclick="deleteRow(${r.id})">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ---- FORM ----
function openAdd() {
  document.getElementById('form-title').textContent = 'Добавить запись';
  document.getElementById('edit-id').value = '';
  document.getElementById('f-shk').value = '';
  document.getElementById('f-kol').value = '1';
  document.getElementById('f-korob').value = '1';
  document.getElementById('f-data').value = nowDatetime();
  document.getElementById('form-overlay').classList.add('open');
}

function openEdit(id, row) {
  document.getElementById('form-title').textContent = 'Изменить запись';
  document.getElementById('edit-id').value = id;
  document.getElementById('f-shk').value = row.shk || '';
  document.getElementById('f-kol').value = row.kolichestvo || 1;
  document.getElementById('f-korob').value = row.nomerKoroba || 1;
  document.getElementById('f-data').value = row.data || nowDatetime();
  document.getElementById('form-overlay').classList.add('open');
}

document.getElementById('fab').addEventListener('click', openAdd);
document.getElementById('btn-cancel').addEventListener('click', () => {
  document.getElementById('form-overlay').classList.remove('open');
});
document.getElementById('form-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('form-overlay')) {
    document.getElementById('form-overlay').classList.remove('open');
  }
});

document.getElementById('row-form').addEventListener('submit', async e => {
  e.preventDefault();
  const rowId = document.getElementById('edit-id').value;
  const body = {
    shk: document.getElementById('f-shk').value,
    kolichestvo: document.getElementById('f-kol').value,
    nomerKoroba: document.getElementById('f-korob').value,
    data: document.getElementById('f-data').value || nowDatetime(),
  };
  const method = rowId ? 'PUT' : 'POST';
  const url = rowId
    ? `/api/rows/${encodeURIComponent(currentSheet)}/${rowId}`
    : `/api/rows/${encodeURIComponent(currentSheet)}`;
  const resp = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!resp.ok) { const err = await resp.json(); alert('Ошибка: ' + (err.error || JSON.stringify(err))); return; }
  document.getElementById('form-overlay').classList.remove('open');
  loadRows();
});

async function deleteRow(id) {
  if (!confirm('Удалить строку?')) return;
  const resp = await fetch(`/api/rows/${encodeURIComponent(currentSheet)}/${id}`, {
    method: 'DELETE',
  });
  if (!resp.ok) { const err = await resp.json(); alert('Ошибка: ' + (err.error || JSON.stringify(err))); return; }
  loadRows();
}

// ---- COUNTER ----
function inc(id) { const el = document.getElementById(id); el.value = parseInt(el.value || 0) + 1; }
function dec(id) { const el = document.getElementById(id); el.value = Math.max(0, parseInt(el.value || 0) - 1); }

// ---- SCANNER ----
let scannerStream = null;
let scannerActive = false;

document.getElementById('btn-scan').addEventListener('click', openScanner);
document.getElementById('cam-close').addEventListener('click', closeScanner);

async function openScanner() {
  document.getElementById('cam-overlay').classList.add('open');
  if ('BarcodeDetector' in window) {
    document.getElementById('cam-native').style.display = 'block';
    document.getElementById('cam-reader').style.display = 'none';
    await startNativeScanner();
  } else {
    document.getElementById('cam-native').style.display = 'none';
    document.getElementById('cam-reader').style.display = 'block';
    await startFallbackScanner();
  }
}

async function startNativeScanner() {
  const video = document.getElementById('cam-video');
  const formats = ['ean_13', 'ean_8', 'code_128', 'code_39', 'qr_code'];
  let fmts = formats;
  try {
    const sup = await BarcodeDetector.getSupportedFormats();
    fmts = formats.filter(f => sup.includes(f));
    if (!fmts.length) fmts = formats;
  } catch (e) {}
  const detector = new BarcodeDetector({ formats: fmts });

  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    video.srcObject = scannerStream;
    scannerActive = true;

    const loop = async () => {
      if (!scannerActive) return;
      if (video.readyState >= 2) {
        try {
          const codes = await detector.detect(video);
          if (codes.length) {
            document.getElementById('f-shk').value = codes[0].rawValue;
            closeScanner();
            return;
          }
        } catch (e) {}
      }
      requestAnimationFrame(loop);
    };
    video.play().then(() => requestAnimationFrame(loop));
  } catch (err) {
    alert('Нет доступа к камере: ' + err);
    document.getElementById('cam-overlay').classList.remove('open');
  }
}

async function startFallbackScanner() {
  html5QrCode = new Html5Qrcode('cam-reader', {
    formatsToSupport: [
      Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.QR_CODE,
    ],
    verbose: false,
  });
  try {
    await html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 25, qrbox: { width: 300, height: 120 }, aspectRatio: 1.7777778, disableFlip: true },
      (decodedText) => { document.getElementById('f-shk').value = decodedText; closeScanner(); },
      () => {}
    );
  } catch (err) {
    alert('Нет доступа к камере: ' + err);
    document.getElementById('cam-overlay').classList.remove('open');
    html5QrCode = null;
  }
}

async function closeScanner() {
  scannerActive = false;
  if (scannerStream) {
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
    document.getElementById('cam-video').srcObject = null;
  }
  if (html5QrCode) {
    try { await html5QrCode.stop(); } catch (e) {}
    html5QrCode.clear();
    html5QrCode = null;
  }
  document.getElementById('cam-overlay').classList.remove('open');
}

// ---- INIT ----
updateExportLink();
loadRows();
</script>
</body>
</html>
